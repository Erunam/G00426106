<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-grid>
      <ion-row class="ion-justify-content-between">
        <ion-col class="left">
          <ion-title><h2><b>{{personName}}</b></h2></ion-title>
        </ion-col>
        <ion-col class="right" >
          <!-- Link Home -->
          <a [routerLink] = "['/home']">
            <ion-icon size="large" class="home" aria-label="Home" name="home">
          </ion-icon>
          </a>
          <!-- Link to Favourites -->
          <a [routerLink] = "['/favourites']">
            <ion-icon size="large" class="heart" aria-label="Favorite" name="heart">
            </ion-icon>
          </a>
          <!-- Increase poster size -->
          <ion-icon class="menu" name="remove-circle-outline" size="large" (click)="onSizeDown()" aria-label="Increase"></ion-icon>
          <!-- Decrease poster size -->
          <ion-icon class="menu" name="add-circle-outline" size="large" (click)="onSizeUp()" aria-label="Increase"></ion-icon>
        </ion-col>
      </ion-row>
    </ion-grid>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <!-- autogenerated card with person info -->
  <ion-card>
    <img *ngIf="((personPoster !=null) && (personPoster !=''))" [src]="posterBaseUrl+personPoster" />
    <ion-card-header>
      <ion-card-title>{{personAka}}</ion-card-title>
      <ion-card-subtitle>Born: {{personDOB}}</ion-card-subtitle>
      <ion-card-subtitle *ngIf="(personDOD !=null)"> Passed away: {{personDOD}}</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      {{personBio}}
    </ion-card-content>
  </ion-card>

  <!-- separator for credit section -->

  <ion-item-divider>
    <ion-label><h1>Movies</h1></ion-label>
  </ion-item-divider>
  <ion-card>
    <ion-card-content>
      <ion-grid>
        <!-- autogenerated box with actor info -->
        <ion-row class="ion-justify-content-between" *ngFor="let movie of personCredits" (click) = "onCardClick(movie.id)">
          <ion-col class="left">
            <ion-title>{{movie.original_title}}</ion-title>
                <ion-card-content>
                  {{movie.overview}}
                </ion-card-content>
          </ion-col>
          <ion-col class="right" >
            <img *ngIf="movie.poster_path !=null" [src]="moviePosterBaseUrl+movie.poster_path" />
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-card-content>
  </ion-card>

</ion-content>

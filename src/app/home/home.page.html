<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-grid>
      <ion-row class="ion-justify-content-between">
        <ion-col class="left">{{name}}</ion-col>
        <ion-col class="right">{{keyword}}2</ion-col>
    </ion-row>
  </ion-grid>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
 
  <ion-button (click)="getTrending()">Trending</ion-button> <br/>
  <ion-button (click)="searchClick('avengers')">Search</ion-button> <br/>

<ion-card *ngFor="let movie of movieData">
  <ion-card-header>
    <ion-card-title></ion-card-title>
    <ion-card-subtitle>Card Subtitle</ion-card-subtitle>
  </ion-card-header>
  <ion-card-content>
    Here's a small text description for the card content. Nothing more, nothing less.
  </ion-card-content>
</ion-card>

</ion-content>
